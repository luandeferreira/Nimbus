<header class="main-header">
  <div class="header-content">
    <h1 class="app-title">Nimbus</h1>
    <app-search-bar (search)="onSearch($event)"></app-search-bar>
    <div class="language-selector">
      <button (click)="switchLanguage('pt')" [class.active]="translate.currentLang === 'pt'">PT</button>
      <button (click)="switchLanguage('en')" [class.active]="translate.currentLang === 'en'">EN</button>
    </div>
  </div>
</header>

<main class="main-content">
  <ng-container *ngIf="weather$ | async as weather">
    <app-weather-card [current]="weather.current" [location]="weather.location"></app-weather-card>
    <app-forecast-list [forecastDays]="weather.forecast.forecastday"></app-forecast-list>
  </ng-container>
</main>
